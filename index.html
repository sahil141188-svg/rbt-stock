<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Robotek &#8212; Stock List | 28 May 2026</title>
<style>
:root{--red:#E52D31;--black:#1F1B20;--yellow:#F7DA11;--green:#16A34A;--bg:#F0EEEF;--card:#FFFFFF;--border:#E2E0E1;--text:#1F1B20;--muted:#6E6A6B;--r:10px;}
*,::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:3px solid var(--red);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px}
.brand-name{font-size:24px;font-weight:700;letter-spacing:2.5px;color:var(--black);line-height:1}
.brand-name em{color:var(--red);font-style:normal}
.brand-line{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.stk-pill{background:var(--black);color:var(--yellow);border-radius:8px;padding:7px 13px;text-align:right}
.stk-n{font-size:20px;font-weight:700;line-height:1}
.stk-l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#888}
.hdr-meta{background:#f7f5f6;border-top:1px solid var(--border);padding:5px 16px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted)}
.live{display:inline-flex;align-items:center;gap:5px;color:var(--green);font-weight:500}
.live::before{content:"";width:6px;height:6px;background:var(--green);border-radius:50%;animation:blk 1.8s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.25}}
.srch-wrap{background:var(--card);padding:11px 14px;border-bottom:1px solid var(--border)}
.srch-box{position:relative}
.srch-box input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 14px 10px 40px;font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:13.5px;color:var(--text);outline:none;transition:border-color .2s}
.srch-box input:focus{border-color:var(--red);background:#fff}
.srch-box input::placeholder{color:#b0acad}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;color:#bbb;pointer-events:none}
.srch-info{font-size:10px;color:var(--muted);text-align:right;margin-top:5px;font-weight:500}
.srch-info b{color:var(--red)}
.tabs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:12px;font-weight:600;white-space:nowrap;padding:6px 14px;border-radius:20px;background:var(--bg);border:1.5px solid var(--border);color:var(--muted);cursor:pointer;transition:all .18s}
.tab.active{background:var(--black);border-color:var(--black);color:var(--yellow)}
.body-wrap{padding:14px 14px 160px}
.stats{display:flex;gap:9px;margin-bottom:14px}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 10px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--red);line-height:1}
.stat-l{font-size:9.5px;color:var(--muted);margin-top:2px;font-weight:500}
.cat-sec{margin-bottom:12px;border-radius:var(--r);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.cat-sec.hidden{display:none}
.cat-head{display:flex;align-items:center;gap:9px;background:var(--black);padding:11px 13px;cursor:pointer;border-left:4px solid var(--yellow)}
.cat-ico{font-size:17px}
.cat-nm{font-size:13px;font-weight:600;color:#fff;flex:1;letter-spacing:.5px;text-transform:uppercase}
.cat-badge{background:rgba(247,218,17,.15);color:var(--yellow);font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;border:1px solid rgba(247,218,17,.3)}
.sel-all-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:10px;font-weight:500;padding:3px 9px;border-radius:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.sel-all-btn:active{background:rgba(255,255,255,.1)}
.chip-grid{background:var(--card);padding:10px;display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:7px 10px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:12.5px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;user-select:none;line-height:1.3}
.chip-dot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0}
.chip:active{transform:scale(.96)}
.chip.sel{background:var(--red);border-color:var(--red);color:#fff}
.chip.sel .chip-dot{background:rgba(255,255,255,.6)}
.chip.match{background:#fff8e1;border-color:#e8c800}
.cq{font-size:10px;font-weight:700;color:var(--muted);background:rgba(0,0,0,.07);border-radius:4px;padding:1px 6px;margin-left:1px;flex-shrink:0;white-space:nowrap}
.chip.sel .cq{color:rgba(255,255,255,.8);background:rgba(255,255,255,.18)}
.chip.match .cq{color:#8a6f00;background:rgba(247,218,17,.3)}
.no-res{display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
#bbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;flex-direction:column}
#bbar.show{display:flex}
.b-panel{background:var(--card);border-top:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .3s}
.b-panel.open{max-height:280px;overflow-y:auto}
.b-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px}
.b-name{font-weight:500;flex:1}
.b-qty{font-size:10px;color:var(--muted);margin-top:2px}
.b-rm{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px}
.b-rm:active{color:var(--red)}
.b-actions{display:flex;gap:9px;padding:11px 14px;background:var(--card);border-top:1px solid var(--border)}
.btn-clear{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:13px;font-weight:600;padding:13px 16px;border-radius:9px;cursor:pointer}
.btn-wa{flex:1;background:#25D366;color:#fff;border:none;font-family:Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px;font-weight:700;padding:13px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;text-decoration:none}
.b-toggle{background:var(--black);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-top:3px solid var(--red)}
.b-left{display:flex;align-items:center;gap:10px}
.b-cnt{background:var(--red);color:#fff;font-size:13px;font-weight:700;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.b-txt{font-size:13px;font-weight:600}
.b-sub{font-size:10px;color:#888;margin-top:1px}
.b-arr{font-size:18px;color:#888;transition:transform .25s}
.b-arr.up{transform:rotate(180deg)}
</style>
</head>
<body>
PLACEHOLDER_BODY
</body>
</html>
